spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wealthpilot?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:wealthuser}
    password: ${SPRING_DATASOURCE_PASSWORD:wealthpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:wealthpilot-super-secret-jwt-key-2024-production}
  expiration: 86400000

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

logging:
  level:
    com.wealthpilot: INFO
